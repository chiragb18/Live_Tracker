<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Location Tracker - Sharing Active</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Custom Sleek Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Premium Mobile Centered Layout Override */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #02050b 0%, #0c101b 100%);
      padding: 16px;
      overflow-x: hidden;
    }
    
    .mobile-client-card {
      width: 100%;
      max-width: 480px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(8, 12, 23, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: var(--shadow-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sharing-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 16px;
    }

    .shield-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(0, 242, 254, 0.1);
      color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    .client-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      align-self: flex-start;
      margin-top: 4px;
    }

    .client-status-active {
      background: rgba(57, 255, 20, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(57, 255, 20, 0.2);
    }

    .client-status-idle {
      background: rgba(255, 159, 67, 0.1);
      color: var(--accent-orange);
      border: 1px solid rgba(255, 159, 67, 0.2);
    }

    /* Transmitter Pulsing Radar Container */
    .transmitter-container {
      position: relative;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }

    .transmitter-pulse {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0, 242, 254, 0.03);
      border: 1px solid var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
      animation: tracking-pulse 2s infinite ease-out;
    }

    .transmitter-pulse-2 {
      animation-delay: 0.7s;
    }

    .transmitter-center {
      position: relative;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 20px var(--accent-cyan), 0 0 40px var(--accent-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #080b11;
      z-index: 2;
    }

    @keyframes tracking-pulse {
      0% {
        transform: scale(0.6);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    .mini-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .mini-stat-card {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mini-stat-lbl {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .mini-stat-val {
      font-size: 15px;
      font-family: var(--font-mono);
      font-weight: 700;
      color: #ffffff;
    }

    /* Embedded micro Leaflet Map */
    .client-map-wrapper {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      height: 160px;
    }

    #client-micro-map {
      width: 100%;
      height: 100%;
      background: #080b11;
    }
  </style>
</head>
<body>

  <div class="mobile-client-card">
    
    <!-- Header Row -->
    <div class="sharing-header">
      <div class="shield-badge" style="background: rgba(0, 242, 254, 0.1); color: var(--accent-cyan);">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
      </div>
      <div style="display: flex; flex-direction: column; flex-grow: 1;">
        <h1 style="font-size: 20px; font-weight: 800; color: #ffffff; margin: 0; letter-spacing: 0.5px; text-transform: uppercase;">CHIRAG BOROLE</h1>
        <div id="client-badge" class="client-status-badge client-status-idle">INITIALIZING STREAM</div>
      </div>
    </div>

    <!-- Pulsing Transmitter Visualizer -->
    <div class="transmitter-container">
      <div id="radar-pulse-1" class="transmitter-pulse"></div>
      <div id="radar-pulse-2" class="transmitter-pulse transmitter-pulse-2"></div>
      <div id="radar-center-dot" class="transmitter-center">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="3" fill="currentColor" />
        </svg>
      </div>
    </div>

    <!-- Active Tracker Session Metadata -->
    <div class="session-display-card glass" style="padding: 12px; margin: 0;">
      <div class="session-id-row" style="margin-bottom: 4px;">
        <span class="session-id-label" style="font-size: 10px;">TRACKER ID</span>
        <span id="client-session-id" class="session-id-val" style="font-size: 13px; color: var(--accent-cyan);">extracting...</span>
      </div>
      <div class="session-id-row">
        <span class="session-id-label" style="font-size: 10px;">LOCK QUALITY</span>
        <span id="client-lock-type" style="font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--accent-orange);">FALLBACK (IP)</span>
      </div>
    </div>

    <!-- Dynamic Live Statistics Grid -->
    <div class="mini-stats-grid">
      <div class="mini-stat-card">
        <span class="mini-stat-lbl">LATITUDE</span>
        <span id="client-lat" class="mini-stat-val">--.------</span>
      </div>
      <div class="mini-stat-card">
        <span class="mini-stat-lbl">LONGITUDE</span>
        <span id="client-lng" class="mini-stat-val">--.------</span>
      </div>
      <div class="mini-stat-card">
        <span class="mini-stat-lbl">SPEED</span>
        <div>
          <span id="client-speed" class="mini-stat-val" style="color: var(--accent-green);">0.0</span>
          <span style="font-size: 9px; color: var(--text-muted);">km/h</span>
        </div>
      </div>
      <div class="mini-stat-card">
        <span class="mini-stat-lbl">ACCURACY</span>
        <div>
          <span id="client-accuracy" class="mini-stat-val">--</span>
          <span style="font-size: 9px; color: var(--text-muted);">meters</span>
        </div>
      </div>
    </div>

    <!-- Micro Leaflet map container to show active coordinates -->
    <div class="client-map-wrapper">
      <div id="client-micro-map"></div>
    </div>

    <!-- Floating Small Disconnect Stream Action Button (Bottom Left) -->
    <button id="btn-disconnect" class="btn btn-danger" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; padding: 8px 12px; font-size: 11px; font-weight: 700; border-radius: 30px; letter-spacing: 0.5px; border: 1px solid rgba(255, 56, 56, 0.4); background: rgba(8, 11, 17, 0.85); backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px rgba(255, 56, 56, 0.2); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);">
      <svg width="10" height="10" fill="currentColor" stroke="none" viewBox="0 0 24 24" style="margin-right: 5px; vertical-align: middle; margin-top: -2px;">
        <rect x="4" y="4" width="16" height="16" rx="2" />
      </svg>
      Disconnect
    </button>

  </div>

  <!-- Dynamic Toast Alerts Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Project Scripts -->
  <script src="firebase-config.js"></script>
  <script src="track.js"></script>
</body>
</html>
